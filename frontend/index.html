<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>AI 내비게이션</title>
<link rel="stylesheet" href="/static/vendor/leaflet.css">
<style>
  .viz-root {
    --surface-1: #fcfcfb;
    --page: #f9f9f7;
    --text-primary: #0b0b0b;
    --text-secondary: #52514e;
    --text-muted: #898781;
    --border: rgba(11,11,11,0.10);
    --series-fastest: #2a78d6;  /* categorical slot 1: blue */
    --series-eco: #1baf7a;      /* categorical slot 2: aqua */
    --delta-good: #006300;
  }
  @media (prefers-color-scheme: dark) {
    .viz-root {
      --surface-1: #1a1a19;
      --page: #0d0d0d;
      --text-primary: #ffffff;
      --text-secondary: #c3c2b7;
      --text-muted: #898781;
      --border: rgba(255,255,255,0.10);
      --series-fastest: #3987e5;
      --series-eco: #199e70;
      --delta-good: #0ca30c;
    }
  }
  * { box-sizing: border-box; }
  body.viz-root {
    margin: 0; height: 100vh; display: flex;
    font-family: system-ui, -apple-system, "Segoe UI", sans-serif;
    background: var(--page); color: var(--text-primary);
  }
  #map { flex: 1; height: 100%; }
  #panel {
    width: 360px; padding: 16px; overflow-y: auto;
    background: var(--surface-1); border-left: 1px solid var(--border);
  }
  h1 { font-size: 16px; margin: 0 0 4px; }
  h2 { font-size: 13px; margin: 16px 0 6px; color: var(--text-secondary); }
  .hint { font-size: 12px; color: var(--text-muted); margin: 0 0 8px; }
  label { display: block; font-size: 12px; color: var(--text-secondary); margin: 10px 0 4px; }
  select, button, input[type=text], input[type=date], input[type=time] {
    width: 100%; padding: 8px; font-size: 13px; border-radius: 6px;
    border: 1px solid var(--border); background: var(--page); color: var(--text-primary);
  }
  button { cursor: pointer; }
  button:disabled { opacity: 0.5; cursor: not-allowed; }
  #calc { font-weight: 650; padding: 10px; }
  .row { display: flex; gap: 8px; }
  .row > * { flex: 1; }
  .chip {
    display: inline-block; font-size: 12px; padding: 4px 8px; border-radius: 999px;
    border: 1px solid var(--border); color: var(--text-secondary); margin-top: 6px;
    max-width: 100%; overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
  }
  .tabs { display: flex; gap: 0; margin-bottom: 8px; border: 1px solid var(--border); border-radius: 6px; overflow: hidden; }
  .tabs button { border: none; border-radius: 0; background: var(--page); color: var(--text-muted); }
  .tabs button.active { background: var(--surface-1); color: var(--text-primary); font-weight: 600; }
  #search-results { list-style: none; margin: 6px 0 0; padding: 0; max-height: 180px; overflow-y: auto; }
  #search-results li {
    padding: 7px 8px; border: 1px solid var(--border); border-radius: 6px; margin-bottom: 4px;
    cursor: pointer; font-size: 13px;
  }
  #search-results li:hover { background: var(--page); }
  #search-results .addr { display: block; font-size: 11px; color: var(--text-muted); }
  #search-results .cat { font-size: 11px; color: var(--text-muted); float: right; }
  .route-card {
    border: 1px solid var(--border); border-radius: 8px;
    padding: 10px 12px; margin-top: 12px;
  }
  .route-card .name { font-size: 13px; font-weight: 600; display: flex; align-items: center; gap: 6px; }
  .swatch { width: 18px; height: 4px; border-radius: 2px; display: inline-block; }
  .tiles { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; margin-top: 8px; }
  .tile .v { font-size: 18px; font-weight: 650; }
  .tile .k { font-size: 11px; color: var(--text-muted); }
  #saving { margin-top: 14px; font-size: 13px; color: var(--text-secondary); }
  #saving .big { color: var(--delta-good); font-weight: 650; }
  #warnings { font-size: 12px; color: var(--text-secondary); margin-top: 10px; }
  #warnings div::before { content: "⚠ "; }
  #status { font-size: 12px; color: var(--text-muted); margin-top: 10px; }
</style>
</head>
<body class="viz-root">
<div id="map"></div>
<div id="panel">
  <h1>AI 내비게이션</h1>
  <p class="hint">출발지·도착지를 전국 어디서나 검색하거나 지도를 클릭해 지정할 수 있습니다.
    실도로 데이터가 없는 지역은 근사 도로망으로 계산됩니다.
    <a href="/live" style="color:var(--series-eco)">📡 실주행 GPS 기록</a></p>

  <h2>출발지</h2>
  <button id="geolocate">📍 현재 위치 사용</button>
  <span class="chip" id="start-label">미지정 — 버튼을 누르거나 지도를 클릭하세요</span>

  <h2>도착지</h2>
  <div class="tabs">
    <button id="tab-search" class="active">통합검색</button>
    <button id="tab-addr">주소로 찾기</button>
  </div>
  <div id="pane-search">
    <input type="text" id="search-input" placeholder="장소·역·지역 검색 (예: 코엑스, 선릉역)" autocomplete="off">
    <ul id="search-results"></ul>
  </div>
  <div id="pane-addr" hidden>
    <label for="sido">시/도</label>
    <select id="sido"></select>
    <label for="sigungu">시/군/구</label>
    <select id="sigungu"></select>
  </div>
  <span class="chip" id="end-label">미지정</span>

  <h2>옵션</h2>
  <label for="vehicle">차종</label>
  <select id="vehicle"></select>

  <h2>출발 시각</h2>
  <div class="tabs">
    <button id="tab-now" class="active">지금 출발</button>
    <button id="tab-later">나중에 출발</button>
  </div>
  <div id="pane-later" hidden>
    <div class="row">
      <div>
        <label for="depart-date">날짜</label>
        <input type="date" id="depart-date">
      </div>
      <div>
        <label for="depart-time">시각</label>
        <input type="time" id="depart-time">
      </div>
    </div>
  </div>
  <p class="hint" style="margin-top:6px">※ 교통 패턴은 시간대·평일/주말 근사이며, 특정 날짜의 실제 정체는 반영하지 않습니다.</p>

  <button id="calc" style="margin-top:8px" disabled>🧭 경로 계산</button>
  <button id="reset" style="margin-top:8px">초기화</button>

  <div id="results" hidden>
    <div class="route-card">
      <div class="name"><span class="swatch" style="background:var(--series-eco)"></span>전비 최적 경로</div>
      <div class="tiles" id="eco-tiles"></div>
    </div>
    <div class="route-card">
      <div class="name"><span class="swatch" style="background:var(--series-fastest)"></span>최소 시간 경로</div>
      <div class="tiles" id="fast-tiles"></div>
    </div>
    <div id="saving"></div>
    <div class="route-card" id="glosa-card" hidden>
      <div class="name">🚦 GLOSA 신호 연동 안내</div>
      <div id="glosa-summary" style="font-size:12px; color:var(--text-secondary); margin-top:6px"></div>
    </div>
    <a id="viewnav" href="/nav" style="display:block; text-align:center; margin-top:8px;
       padding:9px; border:1px solid var(--border); border-radius:6px;
       color:var(--text-primary); text-decoration:none; font-size:13px; font-weight:600">
      🧭 턴바이턴 안내 시작
    </a>
    <a id="view3d" href="/3d" style="display:block; text-align:center; margin-top:8px;
       padding:9px; border:1px solid var(--border); border-radius:6px;
       color:var(--text-primary); text-decoration:none; font-size:13px; font-weight:600">
      🚗 3D 주행 시뮬레이션 보기
    </a>
  </div>
  <div id="warnings"></div>
  <div id="status"></div>
</div>

<script src="/static/vendor/leaflet.js"></script>
<script>
const DEFAULT_CENTER = [37.51, 127.045];
const map = L.map('map').setView(DEFAULT_CENTER, 14);
L.tileLayer('https://tile.openstreetmap.org/{z}/{x}/{y}.png', {
  attribution: '&copy; OpenStreetMap contributors',
}).addTo(map);

const $ = (id) => document.getElementById(id);
const state = {
  start: null, end: null,             // {lat, lng, label}
  startMarker: null, endMarker: null,
  routeLines: [],
};

// ---- 옵션: 차종 ----
fetch('/api/vehicles').then(r => r.json()).then(list => {
  for (const v of list) $('vehicle').add(new Option(v.name, v.id));
});

// ---- 출발 시각: 지금 출발 / 나중에 출발 ----
const WEEKDAY_KO = ['일', '월', '화', '수', '목', '금', '토'];
const pad2 = (n) => String(n).padStart(2, '0');
let departMode = 'now';

function showDepartTab(which) {
  departMode = which;
  $('tab-now').classList.toggle('active', which === 'now');
  $('tab-later').classList.toggle('active', which === 'later');
  $('pane-later').hidden = which !== 'later';
}
$('tab-now').onclick = () => showDepartTab('now');
$('tab-later').onclick = () => showDepartTab('later');

const departDate = $('depart-date');
const departTime = $('depart-time');
{
  const now = new Date();
  departDate.min = `${now.getFullYear()}-${pad2(now.getMonth() + 1)}-${pad2(now.getDate())}`;
  departDate.value = departDate.min;
  const nextHour = new Date(now.getTime() + 60 * 60 * 1000);
  departTime.value = `${pad2(nextHour.getHours())}:00`;
}

function formatDepartLabel(dt) {
  return `${dt.getFullYear()}-${pad2(dt.getMonth() + 1)}-${pad2(dt.getDate())}`
    + `(${WEEKDAY_KO[dt.getDay()]}) ${pad2(dt.getHours())}:${pad2(dt.getMinutes())}`;
}

/** 현재 옵션(지금/나중 출발)에서 서버에 보낼 {hour, isWeekend, label} 계산 */
function getDepartInfo() {
  if (departMode === 'later' && departDate.value && departTime.value) {
    const [y, m, d] = departDate.value.split('-').map(Number);
    const [hh, mm] = departTime.value.split(':').map(Number);
    const dt = new Date(y, m - 1, d, hh, mm || 0);
    return { hour: hh, isWeekend: dt.getDay() === 0 || dt.getDay() === 6, label: formatDepartLabel(dt) };
  }
  const now = new Date();
  return { hour: now.getHours(), isWeekend: now.getDay() === 0 || now.getDay() === 6, label: formatDepartLabel(now) };
}

// ---- 출발지: 현재 위치 ----
$('geolocate').onclick = () => {
  if (!navigator.geolocation) {
    $('status').textContent = '이 브라우저는 위치 정보를 지원하지 않습니다. 지도를 클릭해 주세요.';
    return;
  }
  $('status').textContent = '현재 위치 확인 중…';
  navigator.geolocation.getCurrentPosition(
    (pos) => {
      setStart({ lat: pos.coords.latitude, lng: pos.coords.longitude }, '현재 위치');
      $('status').textContent = '';
    },
    (err) => {
      $('status').textContent = `위치를 가져올 수 없습니다 (${err.message}). 지도를 클릭해 출발지를 지정하세요.`;
    },
    { enableHighAccuracy: true, timeout: 8000 },
  );
};

// ---- 도착지: 탭 전환 ----
function showTab(which) {
  $('tab-search').classList.toggle('active', which === 'search');
  $('tab-addr').classList.toggle('active', which === 'addr');
  $('pane-search').hidden = which !== 'search';
  $('pane-addr').hidden = which !== 'addr';
}
$('tab-search').onclick = () => showTab('search');
$('tab-addr').onclick = () => showTab('addr');

// ---- 통합검색 (debounce) ----
let searchTimer = null;
$('search-input').addEventListener('input', (e) => {
  clearTimeout(searchTimer);
  const q = e.target.value.trim();
  if (!q) { $('search-results').innerHTML = ''; return; }
  searchTimer = setTimeout(async () => {
    const resp = await fetch(`/api/search?q=${encodeURIComponent(q)}`);
    if (!resp.ok) return;
    const items = await resp.json();
    $('search-results').innerHTML = items.length ? '' : '<li>검색 결과가 없습니다</li>';
    for (const it of items) {
      const li = document.createElement('li');
      li.innerHTML = `<span class="cat">${it.category || ''}</span>${it.name}<span class="addr">${it.address || ''}</span>`;
      li.onclick = () => {
        setEnd({ lat: it.lat, lng: it.lon }, it.name);
        $('search-results').innerHTML = '';
        $('search-input').value = it.name;
      };
      $('search-results').appendChild(li);
    }
  }, 250);
});

// ---- 주소(시/도 → 시/군/구) ----
let regions = {};
fetch('/api/regions').then(r => r.json()).then(data => {
  regions = data;
  const sidoSel = $('sido');
  sidoSel.add(new Option('선택하세요', ''));
  for (const sido of Object.keys(regions)) sidoSel.add(new Option(sido, sido));
});
$('sido').onchange = () => {
  const sel = $('sigungu');
  sel.innerHTML = '';
  const sido = $('sido').value;
  if (!sido) return;
  sel.add(new Option('선택하세요', ''));
  for (const gu of Object.keys(regions[sido].districts)) sel.add(new Option(gu, gu));
};
$('sigungu').onchange = () => {
  const sido = $('sido').value, gu = $('sigungu').value;
  if (!sido || !gu) return;
  const d = regions[sido].districts[gu];
  setEnd({ lat: d.lat, lng: d.lon }, `${sido} ${gu}`);
};

// ---- 지도 클릭: 출발지 없으면 출발지, 있으면 도착지 갱신 ----
map.on('click', (e) => {
  if (!state.start) setStart(e.latlng, '지도에서 선택');
  else setEnd(e.latlng, '지도에서 선택');
});

// ---- 상태 갱신 ----
function setMarker(existing, latlng, label) {
  if (existing) map.removeLayer(existing);
  return L.marker(latlng).addTo(map).bindTooltip(label, { permanent: true, direction: 'top' });
}
function updateCalcButtonState() {
  $('calc').disabled = !(state.start && state.end);
}
function setStart(latlng, label) {
  state.start = { ...latlng, label };
  state.startMarker = setMarker(state.startMarker, latlng, `출발: ${label}`);
  $('start-label').textContent = `${label} (${latlng.lat.toFixed(4)}, ${latlng.lng.toFixed(4)})`;
  updateCalcButtonState();
}
function setEnd(latlng, label) {
  state.end = { ...latlng, label };
  state.endMarker = setMarker(state.endMarker, latlng, `도착: ${label}`);
  $('end-label').textContent = `${label} (${latlng.lat.toFixed(4)}, ${latlng.lng.toFixed(4)})`;
  updateCalcButtonState();
}

$('calc').onclick = () => {
  if (!(state.start && state.end)) {
    $('status').textContent = '출발지와 도착지를 먼저 지정하세요.';
    return;
  }
  requestRoute();
};

$('reset').onclick = () => {
  for (const l of [...state.routeLines, state.startMarker, state.endMarker]) {
    if (l) map.removeLayer(l);
  }
  Object.assign(state, { start: null, end: null, startMarker: null, endMarker: null, routeLines: [] });
  $('start-label').textContent = '미지정 — 버튼을 누르거나 지도를 클릭하세요';
  $('end-label').textContent = '미지정';
  $('search-input').value = '';
  $('search-results').innerHTML = '';
  $('results').hidden = true;
  $('warnings').innerHTML = '';
  $('status').textContent = '';
  updateCalcButtonState();
  map.setView(DEFAULT_CENTER, 14);
};

// ---- 경로 요청·표시 ----
function tiles(el, r, fuelType) {
  const isEv = fuelType === 'ev';
  const consumed = isEv ? r.energy_kwh : r.fuel_l;
  const efficiency = isEv ? r.efficiency_km_per_kwh : r.efficiency_km_per_l;
  el.innerHTML = `
    <div class="tile"><div class="v">${consumed}</div><div class="k">${isEv ? 'kWh' : 'L'} 소비</div></div>
    <div class="tile"><div class="v">${r.time_min}</div><div class="k">분 소요</div></div>
    <div class="tile"><div class="v">${r.distance_km}</div><div class="k">km 거리</div></div>
    <div class="tile"><div class="v">${efficiency.toFixed(1)}</div><div class="k">${isEv ? 'km/kWh 전비' : 'km/L 연비'}</div></div>`;
}

async function requestRoute() {
  state.routeLines.forEach(l => map.removeLayer(l));
  state.routeLines = [];
  $('status').textContent = '경로 계산 중…';
  const depart = getDepartInfo();
  const q = new URLSearchParams({
    start_lat: state.start.lat, start_lon: state.start.lng,
    end_lat: state.end.lat, end_lon: state.end.lng,
    hour: depart.hour, is_weekend: depart.isWeekend, vehicle: $('vehicle').value,
  });
  const resp = await fetch(`/api/route?${q}`);
  if (!resp.ok) {
    const err = await resp.json().catch(() => ({}));
    $('status').textContent = `오류: ${err.detail || resp.status}`;
    return;
  }
  draw(await resp.json(), depart);
}

function draw(data, depart) {
  const css = getComputedStyle(document.body);
  const toLatLngs = (r) => r.coordinates.map(c => [c.lat, c.lon]);

  const fast = L.polyline(toLatLngs(data.fastest), {
    color: css.getPropertyValue('--series-fastest').trim(), weight: 5, opacity: 0.9,
  }).addTo(map);
  const eco = L.polyline(toLatLngs(data.eco), {
    color: css.getPropertyValue('--series-eco').trim(), weight: 5, opacity: 0.9, dashArray: '10 6',
  }).addTo(map);
  state.routeLines = [fast, eco];
  map.fitBounds(L.featureGroup([fast, eco, state.startMarker, state.endMarker]).getBounds().pad(0.15));

  tiles($('eco-tiles'), data.eco, data.vehicle.fuel_type);
  tiles($('fast-tiles'), data.fastest, data.vehicle.fuel_type);

  const s = data.saving;
  $('saving').innerHTML = s.energy_wh > 0
    ? `전비 최적 경로 선택 시 <span class="big">${s.energy_wh} Wh (${s.energy_pct}%)</span> 절약,
       추가 소요 ${s.extra_time_min}분`
    : `이 구간은 최소 시간 경로가 곧 전비 최적 경로입니다.`;
  $('warnings').innerHTML = (data.warnings || []).map(w => `<div>${w}</div>`).join('');

  if (data.glosa && data.glosa.advisories.length) {
    const g = data.glosa;
    const isEv = data.vehicle.fuel_type === 'ev';
    const followed = isEv ? `${g.energy_kwh_if_followed} kWh` : `${g.fuel_l_if_followed} L`;
    $('glosa-card').hidden = false;
    $('glosa-summary').innerHTML =
      `신호 ${g.advisories.length}곳에서 감속 안내로 정차 회피 →
       <b style="color:var(--delta-good)">${g.saved_wh} Wh 추가 절약</b>
       (안내 준수 시 총 ${followed})<br>` +
      g.advisories.slice(0, 4).map(a =>
        `· ${a.original_kmh}→<b>${a.advisory_kmh}km/h</b> 감속, 대기 ${a.wait_avoided_s}초 회피`
      ).join('<br>');
  } else {
    $('glosa-card').hidden = true;
  }

  const routeQuery = new URLSearchParams({
    start_lat: state.start.lat, start_lon: state.start.lng,
    end_lat: state.end.lat, end_lon: state.end.lng,
    hour: data.hour, is_weekend: data.is_weekend, vehicle: $('vehicle').value,
  });
  $('view3d').href = '/3d?' + routeQuery;
  $('viewnav').href = '/nav?' + routeQuery;

  $('results').hidden = false;
  $('status').textContent = `${data.vehicle.name} · ${depart.label} 출발 기준`;
}
</script>
</body>
</html>
